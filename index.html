<!-- TRECHO ADICIONADO NO FINAL DO BODY -->
<div id="loadingBarContainer" style="
position: fixed;
bottom: 20px;
right: 20px;
width: 220px;
background: rgba(0,0,0,0.7);
border-radius: 8px;
padding: 10px;
display: none;
z-index: 9999;
font-size: 12px;
">
  <div style="margin-bottom:5px; color:#ccc;">
    Buscando idades... <span id="loadingPercent">0%</span>
  </div>
  <div style="width:100%; height:6px; background:#333; border-radius:5px;">
    <div id="loadingBar" style="
      width:0%;
      height:100%;
      background:#4caf50;
      border-radius:5px;
      transition: width 0.3s;
    "></div>
  </div>
</div>

<script>
function iniciarLoading() {
  document.getElementById("loadingBarContainer").style.display = "block";
  atualizarLoading(0);
}

function atualizarLoading(percent) {
  document.getElementById("loadingBar").style.width = percent + "%";
  document.getElementById("loadingPercent").innerText = percent + "%";
}

function finalizarLoading() {
  setTimeout(() => {
    document.getElementById("loadingBarContainer").style.display = "none";
  }, 1000);
}
</script>
